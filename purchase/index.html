<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بزنس لیجر ڈیش بورڈ - اجمل بھائی</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component that safely accesses Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const apiKey = ""; // Handled by environment

            // Transactions data from your PDF
            const [transactions, setTransactions] = useState([
                { id: 1, date: '2026-03-12', vehicle: '-', type: 'Purchase', description: 'Commercial S.V 45.4 KG (15+filled+pso)', qty: 15, rate: 300.00, debit: 204300, credit: 0 },
                { id: 2, date: '2026-03-15', vehicle: '-', type: 'Payment', description: 'AJMAL BULK - MUHAMMAD AJMAL (Meezan)', qty: 0, rate: 0, debit: 0, credit: 44300 },
                { id: 3, date: '2026-03-20', vehicle: 'LH-5515', type: 'Purchase', description: 'Commercial S.V 45.4 KG (30) (892)', qty: 30, rate: 309.32, debit: 421296.56, credit: 0 },
                { id: 4, date: '2026-03-23', vehicle: 'KH-5515', type: 'Purchase', description: 'Commercial S.V 45.4 KG (20) (1066)', qty: 20, rate: 323.73, debit: 293945.76, credit: 0 },
                { id: 5, date: '2026-03-24', vehicle: '-', type: 'Payment', description: 'AJMAL BULK - Payment (HBL Badar)', qty: 0, rate: 0, debit: 0, credit: 250000 },
                { id: 6, date: '2026-03-24', vehicle: '-', type: 'Payment', description: 'Cash Received through Jamshed (Hamza 2.0)', qty: 0, rate: 0, debit: 0, credit: 250000 },
                { id: 7, date: '2026-03-24', vehicle: '-', type: 'Payment', description: 'Cash Received from Muhammad Ajmal', qty: 0, rate: 0, debit: 0, credit: 175000 },
                { id: 8, date: '2026-03-26', vehicle: '-', type: 'Payment', description: 'Received By Ali From Ajmal Bhai', qty: 0, rate: 0, debit: 0, credit: 135000 },
                { id: 9, date: '2026-03-29', vehicle: '-', type: 'Purchase', description: 'Commercial S.V 45.4 KG (04+FILLED+LAS)', qty: 4, rate: 365.00, debit: 66284, credit: 0 },
                { id: 10, date: '2026-03-30', vehicle: 'KV-7321', type: 'Purchase', description: 'Commercial S.V 45.4 KG (15) (137600)', qty: 15, rate: 372.88, debit: 253932, credit: 0 },
                { id: 11, date: '2026-03-30', vehicle: '-', type: 'Purchase', description: 'Adil Salary - paid for Valve', qty: 0, rate: 0, debit: 7000, credit: 0 },
                { id: 12, date: '2026-03-31', vehicle: '-', type: 'Payment', description: 'AJMAL BULK - Payment (Meezan)', qty: 0, rate: 0, debit: 0, credit: 250000 },
                { id: 13, date: '2026-03-31', vehicle: 'KH-5515', type: 'Purchase', description: 'Commercial S.V 45.4 KG (25) (1403)', qty: 25, rate: 388.13, debit: 440533, credit: 0 },
                { id: 14, date: '2026-03-31', vehicle: '-', type: 'Payment', description: 'AJMAL BULK - MUHAMMAD HAMZA (Meezan)', qty: 0, rate: 0, debit: 0, credit: 107000 },
                { id: 15, date: '2026-03-31', vehicle: '-', type: 'Payment', description: 'Received From Ajmal Bhai By Ali', qty: 0, rate: 0, debit: 0, credit: 300000 },
                { id: 16, date: '2026-04-04', vehicle: '-', type: 'Payment', description: 'AJMAL BULK - Payment (Meezan)', qty: 0, rate: 0, debit: 0, credit: 100000 },
                { id: 17, date: '2026-04-04', vehicle: 'KS-0203', type: 'Purchase', description: 'Commercial S.V 45.4 KG (16) (1600)', qty: 16, rate: 435.70, debit: 316496, credit: 0 },
                { id: 18, date: '2026-04-06', vehicle: '-', type: 'Payment', description: 'Received from Ajmal Bulk', qty: 0, rate: 0, debit: 0, credit: 240000 },
                { id: 19, date: '2026-04-07', vehicle: 'KH-5515', type: 'Purchase', description: 'Commercial S.V 45.4 KG (22) (138596)', qty: 22, rate: 408.09, debit: 407598, credit: 0 },
                { id: 20, date: '2026-04-08', vehicle: '-', type: 'Payment', description: 'AJMAL BULK - Payment (Meezan)', qty: 0, rate: 0, debit: 0, credit: 280000 },
                { id: 21, date: '2026-04-10', vehicle: 'KS-0203', type: 'Purchase', description: 'Commercial S.V 45.4 KG (16) (1943)', qty: 16, rate: 377.12, debit: 273938, credit: 0 },
            ]);

            const [searchTerm, setSearchTerm] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiReport, setAiReport] = useState(null);
            const [isTtsLoading, setIsTtsLoading] = useState(false);
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                vehicle: '',
                type: 'Purchase',
                description: '',
                qty: '',
                rate: '',
                amount: ''
            });

            const stats = useMemo(() => {
                const totalPurchases = transactions.reduce((sum, t) => sum + (t.debit || 0), 0);
                const totalPayments = transactions.reduce((sum, t) => sum + (t.credit || 0), 0);
                return { totalPurchases, totalPayments, payable: totalPurchases - totalPayments };
            }, [transactions]);

            const ledgerData = useMemo(() => {
                let currentBal = 0;
                return [...transactions]
                    .sort((a, b) => new Date(a.date) - new Date(b.date))
                    .map(t => {
                        currentBal += ((t.debit || 0) - (t.credit || 0));
                        return { ...t, balance: currentBal };
                    });
            }, [transactions]);

            const filteredTransactions = ledgerData.filter(t => 
                (t.description || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                (t.vehicle || "").toLowerCase().includes(searchTerm.toLowerCase())
            );

            const formatCurrency = (num) => new Intl.NumberFormat('en-PK', { maximumFractionDigits: 0 }).format(num);

            // Gemini AI Analysis
            const analyzeLedger = async () => {
                setIsAiLoading(true);
                const dataSlice = transactions.slice(-10).map(t => `${t.date}: ${t.description}, D: ${t.debit}, C: ${t.credit}`).join('\n');
                const prompt = `Analyze this business ledger for Ajmal. Supplier is Hamza. Provide a professional summary in Urdu. Mention: Total Purchases, Total Payments, and current trend. Give 1 business tip. Be concise. Data:\n${dataSlice}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    setAiReport(data.candidates?.[0]?.content?.parts?.[0]?.text || "تجزیہ حاصل نہیں کیا جا سکا۔");
                } catch (e) {
                    setAiReport("نیٹ ورک کا مسئلہ ہے۔");
                } finally {
                    setIsAiLoading(false);
                }
            };

            // Gemini TTS
            const speakBalance = async () => {
                setIsTtsLoading(true);
                const msg = `اجمل بھائی، حمزہ کو آپ کے واجب الادا بقایا رقم ${stats.payable} روپے ہے۔`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Professional Urdu male voice: ${msg}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const data = await response.json();
                    const audioBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (audioBase64) {
                        const binary = atob(audioBase64);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        const header = new Uint8Array([82, 73, 70, 70, 36, 0, 0, 0, 87, 65, 86, 69, 102, 109, 116, 32, 16, 0, 0, 0, 1, 0, 1, 0, 128, 62, 0, 0, 0, 125, 0, 0, 2, 0, 16, 0, 100, 97, 116, 97, 0, 0, 0, 0]);
                        const full = new Uint8Array(header.length + bytes.length);
                        full.set(header); full.set(bytes, header.length);
                        const audio = new Audio(URL.createObjectURL(new Blob([full], { type: 'audio/wav' })));
                        audio.play();
                    }
                } catch (e) { console.error(e); }
                finally { setIsTtsLoading(false); }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const isPurchase = formData.type === 'Purchase';
                const calcDebit = isPurchase ? (Number(formData.qty) * 45.4 * Number(formData.rate)) : 0;
                const calcCredit = formData.type === 'Payment' ? Number(formData.amount) : 0;
                setTransactions([...transactions, {
                    id: Date.now(),
                    ...formData,
                    debit: calcDebit,
                    credit: calcCredit,
                    qty: Number(formData.qty) || 0,
                    rate: Number(formData.rate) || 0,
                    vehicle: formData.vehicle || '-'
                }]);
                setShowModal(false);
            };

            return (
                <div className="pb-10">
                    {/* Top Header */}
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#0f172a] p-2 rounded-lg text-white">
                                <Icon name="bar-chart-3" size={20} />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">بزنس لیجر ڈیش بورڈ</h1>
                        </div>
                        <button 
                            onClick={analyzeLedger}
                            disabled={isAiLoading}
                            className="bg-gradient-to-r from-blue-700 to-indigo-600 text-white px-5 py-2 rounded-full text-xs font-bold flex items-center gap-2 shadow-md hover:scale-105 transition-all disabled:opacity-50"
                        >
                            {isAiLoading ? <Icon name="loader-2" size={14} className="animate-spin" /> : <Icon name="sparkles" size={14} />}
                            اے آئی رپورٹ
                        </button>
                    </header>

                    <main className="max-w-[1400px] mx-auto p-4 md:p-8">
                        {/* Summary Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-[#0f172a] p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden group">
                                <div className="relative z-10">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="text-slate-400 text-xs font-medium uppercase">واجب الادا بقایا</p>
                                        <button onClick={speakBalance} disabled={isTtsLoading} className="p-2.5 bg-white/10 rounded-full hover:bg-white/20 transition-all">
                                            {isTtsLoading ? <Icon name="loader-2" size={16} className="animate-spin" /> : <Icon name="volume-2" size={16} />}
                                        </button>
                                    </div>
                                    <h2 className="text-4xl font-black">Rs. {formatCurrency(stats.payable)}</h2>
                                    <p className="text-[10px] text-slate-500 mt-3 font-bold uppercase tracking-widest">✨ سمارٹ لیجر اسسٹنٹ</p>
                                </div>
                                <Icon name="wallet" size={140} className="absolute -bottom-8 -left-8 text-white/5 group-hover:scale-110 transition-transform duration-700" />
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 flex items-center justify-between shadow-sm">
                                <div>
                                    <p className="text-slate-400 text-xs font-bold mb-1 uppercase tracking-wider">کل ادائیگی</p>
                                    <h2 className="text-3xl font-black text-green-600">Rs. {formatCurrency(stats.totalPayments)}</h2>
                                </div>
                                <div className="bg-green-50 text-green-600 p-5 rounded-3xl"><Icon name="trending-up" size={32} /></div>
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 flex items-center justify-between shadow-sm">
                                <div>
                                    <p className="text-slate-400 text-xs font-bold mb-1 uppercase tracking-wider">کل خریداری</p>
                                    <h2 className="text-3xl font-black text-red-500">Rs. {formatCurrency(stats.totalPurchases)}</h2>
                                </div>
                                <div className="bg-red-50 text-red-500 p-5 rounded-3xl"><Icon name="trending-down" size={32} /></div>
                            </div>
                        </div>

                        {/* AI Report Block */}
                        {aiReport && (
                            <div className="mb-8 bg-blue-50 border-r-4 border-blue-600 p-6 rounded-3xl shadow-sm animate-fade-in">
                                <div className="flex justify-between items-start mb-3">
                                    <div className="flex items-center gap-3 text-blue-900 font-bold">
                                        <Icon name="message-square" size={20} />
                                        <span>کاروباری مشورہ (اے آئی)</span>
                                    </div>
                                    <button onClick={() => setAiReport(null)} className="text-blue-400 hover:text-blue-600">✕</button>
                                </div>
                                <p className="text-sm text-blue-800 leading-relaxed whitespace-pre-wrap">{aiReport}</p>
                            </div>
                        )}

                        {/* Search & Add */}
                        <div className="flex flex-col md:flex-row gap-4 mb-6">
                            <div className="relative flex-1">
                                <Icon name="search" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="تفصیل یا گاڑی نمبر تلاش کریں..." 
                                    className="w-full bg-white pr-12 pl-4 py-3.5 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-400 text-sm"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <button 
                                onClick={() => setShowModal(true)}
                                className="bg-[#0f172a] text-white px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg hover:bg-slate-800 transition-all"
                            >
                                <Icon name="plus-circle" size={22} />
                                نیا اندراج
                            </button>
                        </div>

                        {/* Table */}
                        <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-right">
                                    <thead>
                                        <tr className="bg-[#f8fafc] text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                                            <th className="px-6 py-5">تاریخ</th>
                                            <th className="px-6 py-5">گاڑی</th>
                                            <th className="px-6 py-5">تفصیل</th>
                                            <th className="px-4 py-5 text-center">تعداد</th>
                                            <th className="px-6 py-5 text-left text-red-500/70">خریداری (+)</th>
                                            <th className="px-6 py-5 text-left text-green-600/70">ادائیگی (-)</th>
                                            <th className="px-8 py-5 text-left bg-slate-50 text-slate-900">کل بیلنس</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {filteredTransactions.map((t) => (
                                            <tr key={t.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-6 whitespace-nowrap text-sm font-bold text-slate-600">
                                                    {new Date(t.date).toLocaleDateString('ur-PK', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                </td>
                                                <td className="px-6 py-6 text-sm font-black text-slate-300">{t.vehicle}</td>
                                                <td className="px-6 py-6 text-sm font-bold text-slate-800 max-w-[250px]">{t.description}</td>
                                                <td className="px-4 py-6 text-center text-sm font-black text-slate-500">{t.qty || '-'}</td>
                                                <td className="px-6 py-6 text-left text-sm font-black text-red-500">{t.debit > 0 ? formatCurrency(t.debit) : '-'}</td>
                                                <td className="px-6 py-6 text-left text-sm font-black text-green-600">{t.credit > 0 ? formatCurrency(t.credit) : '-'}</td>
                                                <td className="px-8 py-6 text-left bg-slate-50/30 text-sm font-black text-[#0f172a]">{formatCurrency(t.balance)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* Entry Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-[#0f172a]/70 backdrop-blur-md flex items-center justify-center z-50 p-4">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl overflow-hidden animate-fade-in">
                                <div className="p-8 border-b flex justify-between items-center bg-[#f8fafc]">
                                    <h2 className="text-xl font-bold text-[#0f172a]">نیا ٹرانزیکشن</h2>
                                    <button onClick={() => setShowModal(false)} className="text-slate-400 font-bold">بند کریں</button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-8 space-y-6">
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-400 uppercase">تاریخ</label>
                                            <input name="date" type="date" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-bold text-slate-400 uppercase">قسم</label>
                                            <select name="type" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none">
                                                <option value="Purchase">خریداری (+)</option>
                                                <option value="Payment">ادائیگی (-)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-bold text-slate-400 uppercase">تفصیل</label>
                                        <input name="description" required placeholder="مثلاً: سلنڈر خریدے" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none" />
                                    </div>
                                    {formData.type === 'Purchase' ? (
                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[11px] font-bold text-slate-400 uppercase">تعداد</label>
                                                <input name="qty" type="number" required placeholder="0" value={formData.qty} onChange={e => setFormData({...formData, qty: e.target.value})} className="w-full p-4 bg-blue-50 text-[#0f172a] rounded-2xl text-sm font-bold border-none outline-none" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[11px] font-bold text-slate-400 uppercase">ریٹ</label>
                                                <input name="rate" type="number" step="0.01" required placeholder="0" value={formData.rate} onChange={e => setFormData({...formData, rate: e.target.value})} className="w-full p-4 bg-blue-50 text-[#0f172a] rounded-2xl text-sm font-bold border-none outline-none" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[11px] font-bold text-slate-400 uppercase">گاڑی</label>
                                                <input name="vehicle" placeholder="نمبر" value={formData.vehicle} onChange={e => setFormData({...formData, vehicle: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none" />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[11px] font-bold text-slate-400 uppercase">بینک / کیش</label>
                                                <input name="account" placeholder="Meezan" value={formData.account} onChange={e => setFormData({...formData, account: e.target.value})} className="w-full p-4 bg-green-50 text-green-800 rounded-2xl text-sm font-bold border-none outline-none" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[11px] font-bold text-slate-400 uppercase">رقم</label>
                                                <input name="amount" type="number" required placeholder="0" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full p-4 bg-green-50 text-green-800 rounded-2xl text-sm font-bold border-none outline-none" />
                                            </div>
                                        </div>
                                    )}
                                    <button type="submit" className="w-full bg-[#0f172a] text-white py-5 rounded-[2.5rem] font-black shadow-xl mt-4 hover:bg-slate-800 transition-all">محفوظ کریں</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
