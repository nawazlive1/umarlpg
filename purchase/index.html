                const combined = [...initialPdfData, ...cloudTransactions];
                return combined.sort((a, b) => new Date(a.date) - new Date(b.date));
            }, [cloudTransactions]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) { console.error("Auth Error:", error); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const transactionsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions');
                const unsubscribe = transactionsRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCloudTransactions(data);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const totalPurchases = transactions.reduce((sum, t) => sum + (Number(t.debit) || 0), 0);
                const totalPayments = transactions.reduce((sum, t) => sum + (Number(t.credit) || 0), 0);
                return { totalPurchases, totalPayments, payable: totalPurchases - totalPayments };
            }, [transactions]);

            const ledgerData = useMemo(() => {
                let currentBal = 0;
                return transactions.map(t => {
                    currentBal += ((Number(t.debit) || 0) - (Number(t.credit) || 0));
                    return { ...t, balance: currentBal };
                });
            }, [transactions]);

            const filteredTransactions = ledgerData.filter(t => 
                (t.description || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                (t.vehicle || "").toLowerCase().includes(searchTerm.toLowerCase())
            ).reverse();

            const formatCurrency = (num) => new Intl.NumberFormat('en-PK', { maximumFractionDigits: 0 }).format(num);

            const analyzeLedger = async () => {
                if (!apiKey) return;
                setIsAiLoading(true);
                const dataSlice = transactions.slice(-15).map(t => `${t.date}: ${t.description}, D: ${t.debit}, C: ${t.credit}`).join('\n');
                const prompt = `Analyze this ledger for Ajmal Bhai. Supplier is Hamza. Summary in Urdu: Current trend, total due, and one smart tip. Data:\n${dataSlice}`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    setAiReport(data.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (e) { setAiReport("نیٹ ورک کا مسئلہ ہے۔"); }
                finally { setIsAiLoading(false); }
            };

            const speakBalance = async () => {
                if (!apiKey) return;
                setIsTtsLoading(true);
                const msg = `اجمل بھائی، حمزہ کو آپ کے واجب الادا بقایا رقم ${Math.round(stats.payable)} روپے ہے۔`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Professional Urdu male voice: ${msg}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const data = await response.json();
                    const audioBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (audioBase64) {
                        const binary = atob(audioBase64);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        const header = new Uint8Array([82, 73, 70, 70, 36, 0, 0, 0, 87, 65, 86, 69, 102, 109, 116, 32, 16, 0, 0, 0, 1, 0, 1, 0, 128, 62, 0, 0, 0, 125, 0, 0, 2, 0, 16, 0, 100, 97, 116, 97, 0, 0, 0, 0]);
                        const full = new Uint8Array(header.length + bytes.length);
                        full.set(header); full.set(bytes, header.length);
                        new Audio(URL.createObjectURL(new Blob([full], { type: 'audio/wav' }))).play();
                    }
                } catch (e) { console.error(e); }
                finally { setIsTtsLoading(false); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                const isPurchase = formData.type === 'Purchase';
                const isLumpSum = formData.type === 'LumpSum';
                const calcDebit = isPurchase ? (Number(formData.qty) * 45.4 * Number(formData.rate)) : 0;
                const calcCredit = (formData.type === 'Payment' || isLumpSum) ? Number(formData.amount) : 0;
                const finalDesc = isLumpSum ? `(لم سم ادائیگی) ${formData.description}` : formData.description;

                const newEntry = {
                    date: formData.date,
                    description: finalDesc,
                    debit: calcDebit,
                    credit: calcCredit,
                    qty: Number(formData.qty) || 0,
                    rate: Number(formData.rate) || 0,
                    vehicle: formData.vehicle || '-',
                    type: formData.type
                };

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').add(newEntry);
                    setShowModal(false);
                    setFormData({ ...formData, description: '', qty: '', rate: '', amount: '', vehicle: '' });
                } catch (err) { console.error(err); }
            };

            const deleteTransaction = async (id, isLocked) => {
                if (isLocked) { alert("یہ پرانا ریکارڈ ہے، اسے تبدیل نہیں کیا جا سکتا۔"); return; }
                if (!window.confirm("کیا آپ واقعی یہ ریکارڈ ختم کرنا چاہتے ہیں؟")) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').doc(id).delete();
                } catch (err) { console.error(err); }
            };

            return (
                <div className="pb-10">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#0f172a] p-2 rounded-lg text-white"><Icon name="bar-chart-3" size={20} /></div>
                            <h1 className="text-xl font-bold">بزنس لیجر ڈیش بورڈ</h1>
                        </div>
                        <button onClick={analyzeLedger} disabled={isAiLoading || !apiKey} className="bg-gradient-to-r from-blue-700 to-indigo-600 text-white px-5 py-2 rounded-full text-xs font-bold flex items-center gap-2 shadow-md disabled:opacity-50">
                            {isAiLoading ? <Icon name="loader-2" size={14} className="animate-spin" /> : <Icon name="sparkles" size={14} />} اے آئی رپورٹ
                        </button>
                    </header>

                    <main className="max-w-[1400px] mx-auto p-4 md:p-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-[#0f172a] p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden group">
                                <div className="relative z-10">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="text-slate-400 text-xs font-medium uppercase tracking-wider">موجودہ بیلنس (واجب الادا)</p>
                                        <button onClick={speakBalance} disabled={isTtsLoading || !apiKey} className="p-2.5 bg-white/10 rounded-full hover:bg-white/20 transition-all">
                                            {isTtsLoading ? <Icon name="loader-2" size={16} className="animate-spin" /> : <Icon name="volume-2" size={16} />}
                                        </button>
                                    </div>
                                    <h2 className="text-4xl font-black">Rs. {formatCurrency(stats.payable)}</h2>
                                    <p className="text-[10px] text-slate-500 mt-3 font-bold uppercase tracking-widest">✨ کلاؤڈ سسٹم میں محفوظ شدہ</p>
                                </div>
                                <Icon name="wallet" size={140} className="absolute -bottom-8 -left-8 text-white/5 transition-transform duration-700 group-hover:scale-110" />
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border flex items-center justify-between shadow-sm">
                                <div><p className="text-slate-400 text-xs font-bold mb-1 uppercase tracking-wider">کل ادائیگی</p><h2 className="text-3xl font-black text-green-600">Rs. {formatCurrency(stats.totalPayments)}</h2></div>
                                <div className="bg-green-50 text-green-600 p-5 rounded-3xl"><Icon name="trending-up" size={32} /></div>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border flex items-center justify-between shadow-sm">
                                <div><p className="text-slate-400 text-xs font-bold mb-1 uppercase tracking-wider">کل خریداری</p><h2 className="text-3xl font-black text-red-500">Rs. {formatCurrency(stats.totalPurchases)}</h2></div>
                                <div className="bg-red-50 text-red-500 p-5 rounded-3xl"><Icon name="trending-down" size={32} /></div>
                            </div>
                        </div>

                        {aiReport && (
                            <div className="mb-8 bg-blue-50 border-r-4 border-blue-600 p-6 rounded-3xl shadow-sm animate-fade-in">
                                <div className="flex justify-between items-start mb-3">
                                    <div className="flex items-center gap-3 text-blue-900 font-bold"><Icon name="message-square" size={20} /><span>کاروباری مشورہ (اے آئی)</span></div>
                                    <button onClick={() => setAiReport(null)} className="text-blue-400 hover:text-blue-600">✕</button>
                                </div>
                                <p className="text-sm text-blue-800 leading-relaxed whitespace-pre-wrap">{aiReport}</p>
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row gap-4 mb-6">
                            <div className="relative flex-1">
                                <Icon name="search" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="تلاش کریں (تفصیل یا گاڑی نمبر)..." className="w-full bg-white pr-12 pl-4 py-3.5 rounded-2xl border outline-none text-sm focus:ring-2 focus:ring-blue-200 transition-all" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setShowModal(true)} className="bg-[#0f172a] text-white px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg hover:bg-slate-800 transition-all"> <Icon name="plus-circle" size={22} /> نیا اندراج </button>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                            <div className="overflow-x-auto no-scrollbar">
                                <table className="w-full text-right">
                                    <thead>
                                        <tr className="bg-[#f8fafc] text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                                            <th className="px-6 py-5">تاریخ</th><th className="px-6 py-5">گاڑی</th><th className="px-6 py-5">تفصیل</th><th className="px-4 py-5 text-center">تعداد</th><th className="px-6 py-5 text-left text-red-500/70">خریداری (+)</th><th className="px-6 py-5 text-left text-green-600/70">ادائیگی (-)</th><th className="px-8 py-5 text-left bg-slate-50 text-slate-900">کل بیلنس</th><th className="px-4 py-5"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {isLoading ? (
                                            <tr><td colSpan="8" className="py-20 text-center text-slate-400 font-bold">لوڈ ہو رہا ہے...</td></tr>
                                        ) : filteredTransactions.map((t) => (
                                            <tr key={t.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="px-6 py-6 whitespace-nowrap text-sm font-bold text-slate-600">
                                                    {new Date(t.date).toLocaleDateString('ur-PK', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                </td>
                                                <td className="px-6 py-6 text-sm font-black text-slate-300">{t.vehicle}</td>
                                                <td className="px-6 py-6 text-sm font-bold text-slate-800 max-w-[280px] leading-tight">{t.description}</td>
                                                <td className="px-4 py-6 text-center text-sm font-black text-slate-500">{t.qty || '-'}</td>
                                                <td className="px-6 py-6 text-left text-sm font-black text-red-500">{t.debit > 0 ? formatCurrency(t.debit) : '-'}</td>
                                                <td className="px-6 py-6 text-left text-sm font-black text-green-600">{t.credit > 0 ? formatCurrency(t.credit) : '-'}</td>
                                                <td className="px-8 py-6 text-left bg-slate-50/30 text-sm font-black text-[#0f172a]">{formatCurrency(t.balance)}</td>
                                                <td className="px-4 py-6 text-center">
                                                    {!t.isLocked && (
                                                        <button onClick={() => deleteTransaction(t.id, t.isLocked)} className="text-slate-200 hover:text-red-400 transition-colors">
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-[#0f172a]/70 backdrop-blur-md flex items-center justify-center z-50 p-4">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] shadow-2xl animate-fade-in overflow-hidden">
                                <div className="p-8 border-b flex justify-between items-center bg-[#f8fafc]"><h2 className="text-xl font-bold">نیا ٹرانزیکشن</h2><button onClick={() => setShowModal(false)} className="bg-slate-200 hover:bg-slate-300 p-2 rounded-full transition-all">✕</button></div>
                                <form onSubmit={handleSubmit} className="p-8 space-y-6">
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">تاریخ</label><input name="date" type="date" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-100" /></div>
                                        <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">قسم</label><select name="type" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-100"><option value="Purchase">خریداری (+)</option><option value="Payment">ادائیگی (-)</option><option value="LumpSum">لم سم ادائیگی</option></select></div>
                                    </div>
                                    <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">تفصیل</label><input name="description" required placeholder="تفصیل لکھیں..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-100" /></div>
                                    {formData.type === 'Purchase' ? (
                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">تعداد</label><input name="qty" type="number" required value={formData.qty} onChange={e => setFormData({...formData, qty: e.target.value})} className="w-full p-4 bg-blue-50 text-[#0f172a] rounded-2xl text-sm font-bold border-none outline-none" /></div>
                                            <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">ریٹ</label><input name="rate" type="number" step="0.01" required value={formData.rate} onChange={e => setFormData({...formData, rate: e.target.value})} className="w-full p-4 bg-blue-50 text-[#0f172a] rounded-2xl text-sm font-bold border-none outline-none" /></div>
                                            <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">گاڑی</label><input name="vehicle" placeholder="نمبر" value={formData.vehicle} onChange={e => setFormData({...formData, vehicle: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none outline-none" /></div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">بینک / کیش</label><input name="account" placeholder="Meezan, Cash" value={formData.account} onChange={e => setFormData({...formData, account: e.target.value})} className="w-full p-4 bg-green-50 text-green-800 rounded-2xl text-sm font-bold border-none outline-none" /></div>
                                            <div className="space-y-1"><label className="text-[11px] font-bold text-slate-400 uppercase tracking-wide">رقم</label><input name="amount" type="number" required value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full p-4 bg-green-50 text-green-800 rounded-2xl text-sm font-bold border-none outline-none" /></div>
                                        </div>
                                    )}
                                    <button type="submit" className="w-full bg-[#0f172a] text-white py-5 rounded-[2.5rem] font-black shadow-xl mt-4 hover:bg-slate-800 hover:scale-[1.02] active:scale-95 transition-all tracking-widest">ڈیٹا محفوظ کریں</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
